name: Release VSIX

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npm run package:vsix

      - name: Locate VSIX file
        id: vsix
        run: |
          VSIX_FILE="$(find . -maxdepth 1 -name '*.vsix' -print | head -n 1)"
          if [ -z "$VSIX_FILE" ]; then
            echo "No VSIX file was generated."
            exit 1
          fi
          echo "path=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$VSIX_FILE")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.path }}
